<div class="features-wrapper mx-auto w-full max-w-[var(--container-max)] flex flex-col gap-12">
  <div class="flex flex-col gap-6">
    <h2
      class="text-black font-bold text-3xl md:text-5xl leading-[58px] tracking-normal"
    >
      Lorem ipsum dolor sit
    </h2>

    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-[10px]">
      <p class="text-black font-normal text-[18px] leading-[27px] tracking-normal">
        Lorem ipsum dolor sit
      </p>

      <div class="relative w-full md:w-[300px] h-10 shrink-0">
        <span class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M7.66668 14C11.1645 14 14 11.1645 14 7.66671C14 4.1689 11.1645 1.33337 7.66668 1.33337C4.16887 1.33337 1.33334 4.1689 1.33334 7.66671C1.33334 11.1645 4.16887 14 7.66668 14Z"
              stroke="#1C274C"
              stroke-width="1.5"
            />
            <path
              d="M13.3333 13.3334L14.6667 14.6667"
              stroke="#1C274C"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </span>

        <input
          type="text"
          aria-label="Find categories"
          class="w-full h-full pl-11 pr-4 bg-riu-bg-section border border-transparent rounded-lg text-black text-sm outline-none focus:bg-white focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-black focus-visible:ring-offset-2"
        />
      </div>
    </div>
  </div>

  <div class="cards-grid">
    @for (card of cards; track card.id) {
      <app-feature-card
        [data]="card"
        [class.hidden]="!card.showOnMobile"
        class="lg:block"
      ></app-feature-card>
    }
  </div>
</div>
