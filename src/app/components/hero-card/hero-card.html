<div class="card-container bg-white rounded-lg p-8 w-full flex flex-col lg:flex-row gap-8">
    
    <div class="card-image w-full lg:w-1/2 bg-riu-placeholder rounded-lg flex items-center justify-center ">
      <span class="text-stone-400 font-bold text-4xl">IMAGE</span>
    </div>

    <div class="w-full lg:w-1/2 flex flex-col justify-between gap-4">
      
      <div class="space-y-4">
        <div class="flex items-center gap-2 text-base text-riu-dark font-bold">
          <img src="assets/icons/Calendar.svg" class="w-6 h-6 shrink-0" alt="" aria-hidden="true"/>
          {{ data.dateLabel }}
        </div>

        <h1 class="text-riu-dark font-bold text-[24px] leading-[28px]">
          {{ data.title }}
        </h1>

        <p class="text-riu-dark text-base leading-6">
          {{ data.description }}
        </p>
      </div>

      <div class="flex justify-end">
        <button class="bg-riu-red hover:bg-red-700 text-white font-sans text-xs font-semibold h-11 md:h-10 px-6 rounded-lg transition-colors duration-200 cursor-pointer focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-black focus-visible:ring-offset-2">
          {{ data.ctaLabel }}
        </button>
      </div>

    </div>

</div>
